services:

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - docker.env
    volumes:
      - sqlite_data:/data
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
  sqlite_data:
