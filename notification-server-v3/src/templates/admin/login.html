<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Notification Server Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="h-full flex items-center justify-center">

<div class="w-full max-w-sm">

  <!-- Logo / title -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-blue-600 mb-4">
      <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"/>
      </svg>
    </div>
    <h1 class="text-xl font-bold text-gray-900">Notification Server</h1>
    <p class="text-sm text-gray-500 mt-1">Admin Panel — Sign in to continue</p>
  </div>

  <!-- Card -->
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-8">

    {% if error %}
    <div class="mb-5 flex items-start gap-3 px-4 py-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg">
      <svg class="w-4 h-4 mt-0.5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
      </svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/admin/login" class="space-y-5">
      <input type="hidden" name="next" value="{{ next }}" />

      <div>
        <label for="username" class="block text-sm font-medium text-gray-700 mb-1.5">
          Username
        </label>
        <input id="username" name="username" type="text"
               required autofocus autocomplete="username"
               class="w-full px-3 py-2.5 text-sm border border-gray-300 rounded-lg
                      focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                      placeholder:text-gray-400"
               placeholder="admin" />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">
          Password
        </label>
        <input id="password" name="password" type="password"
               required autocomplete="current-password"
               class="w-full px-3 py-2.5 text-sm border border-gray-300 rounded-lg
                      focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                      placeholder:text-gray-400"
               placeholder="••••••••" />
      </div>

      <button type="submit"
              class="w-full py-2.5 bg-blue-600 text-white text-sm font-semibold rounded-lg
                     hover:bg-blue-700 active:bg-blue-800 transition-colors">
        Sign in
      </button>
    </form>
  </div>

</div>
</body>
</html>
