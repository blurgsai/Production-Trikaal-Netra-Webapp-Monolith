<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Admin{% endblock %} — Notification Server</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#f0f9ff', 100:'#e0f2fe', 500:'#0ea5e9', 600:'#0284c7', 700:'#0369a1' }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="h-full">
<div class="flex h-full min-h-screen">

  <!-- Sidebar -->
  <aside class="w-60 shrink-0 bg-white border-r border-gray-200 flex flex-col">
    <div class="h-16 flex items-center px-5 border-b border-gray-200">
      <span class="text-lg font-bold text-brand-700 tracking-tight">Notif Admin</span>
    </div>
    <nav class="flex-1 p-4 space-y-1">
      <a href="/admin"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors {% if active == 'dashboard' %}bg-blue-100 text-blue-700{% else %}text-gray-600 hover:bg-blue-50 hover:text-blue-700{% endif %}">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z"/>
        </svg>
        Dashboard
      </a>
      <a href="/admin/groups"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors {% if active == 'groups' %}bg-blue-100 text-blue-700{% else %}text-gray-600 hover:bg-blue-50 hover:text-blue-700{% endif %}">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"/>
        </svg>
        Groups
      </a>
      <a href="/admin/clients"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors {% if active == 'clients' %}bg-blue-100 text-blue-700{% else %}text-gray-600 hover:bg-blue-50 hover:text-blue-700{% endif %}">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
        </svg>
        Clients / Users
      </a>
    </nav>
    <div class="p-4 border-t border-gray-200 space-y-3">
      <a href="/docs" target="_blank"
         class="flex items-center gap-2 text-xs text-gray-400 hover:text-blue-600 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/>
        </svg>
        API Docs
      </a>
      {% if current_admin %}
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2 min-w-0">
          <div class="w-6 h-6 rounded-full bg-blue-100 flex items-center justify-center shrink-0">
            <span class="text-xs font-bold text-blue-700">{{ current_admin[0] | upper }}</span>
          </div>
          <span class="text-xs text-gray-600 truncate">{{ current_admin }}</span>
        </div>
        <form method="POST" action="/admin/logout">
          <button type="submit"
                  title="Sign out"
                  class="p-1 text-gray-400 hover:text-red-500 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/>
            </svg>
          </button>
        </form>
      </div>
      {% endif %}
    </div>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col min-w-0">
    <header class="h-16 bg-white border-b border-gray-200 flex items-center px-8 shrink-0">
      <h1 class="text-base font-semibold text-gray-800">{% block heading %}Admin Panel{% endblock %}</h1>
      <div class="ml-auto flex items-center gap-3">
        {% block header_actions %}{% endblock %}
      </div>
    </header>
    <main class="flex-1 overflow-auto p-8">
      {% block content %}{% endblock %}
    </main>
  </div>

</div>
</body>
</html>
