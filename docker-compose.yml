# ──────────────────────────────────────────────────────────────────────────────
# Unified Docker Compose for Trikaal Netra Monolith
# ──────────────────────────────────────────────────────────────────────────────
# This compose file orchestrates all services in the monolith:
# - Backend (FastAPI)
# - Frontend (React + Nginx)
# - Tileserver
# - GeoServer (PostGIS + GeoServer + pgAdmin)
# - RAG Base (Ollama, Tool Server, API, Chat App, Config App, MinIO)
# - Notification Server v3
# ──────────────────────────────────────────────────────────────────────────────

services:
  # ──────────────────────────────────────────────────────────────────────────────
  # Core Monolith Services
  # ──────────────────────────────────────────────────────────────────────────────

  backend:
    image: asia-south1-docker.pkg.dev/pivotal-sonar-462710-d2/trikaal-monolith/trikaal-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trikaal-backend
    ports:
      - "5000:5000"
    environment:
      # ClickHouse configuration
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=FcBkawbYEPanUDFip9Wad17RuvNQrMFTiGG+4gnquUw=
      - CLICKHOUSE_HOST=34.14.212.228
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_AIS_TABLE=ais_processed_flat
      # MongoDB configuration
      - MONGO_URI=mongodb://admin:StrongPassword123@34.14.212.228:27017
      - MONGO_DB=dev
      - EVENTS_COLLECTION=events
      - COMPOUND_COLLECTION=compound_events
      - VESSEL_STATE_COLLECTION=vessel_state
      # JWT configuration
      - JWT_SECRET=jwt-secret-key
      - JWT_ALGORITHM=HS256
      # MinIO configuration
      - MINIO_ENDPOINT=http://34.14.212.228:9100
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      # GeoServer configuration
      - GEOSERVER_URL=http://34.14.168.111:8080/geoserver
      - GEOSERVER_WORKSPACE=trikaalx
      - GEOSERVER_USERNAME=admin
      - GEOSERVER_PASSWORD=geoserver
      # User activation tokens
      - USER_ACTIVATION_TOKEN_SECRET=8f3c9a2d7e6b4f1c0a9d5e8b2c7f6a1d3e9c4b8f0a2d6c7e1f9b3a5d8c2e6f1
      - USER_ACTIVATION_SALT=activate-account-salt
    networks:
      - monolith-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    image: asia-south1-docker.pkg.dev/pivotal-sonar-462710-d2/trikaal-monolith/trikaal-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_BASE_URL=/api
        - VITE_TILESERVER_URL=/tileserver
        - VITE_CHATBOT_BASE_URL=/chatbot
        - VITE_USE_REAL_PLAYBACK=true
        - VITE_GEOSERVER_API_BASE_URL=/api
        - VITE_WS_BASE_URL=/ws
        - VITE_GEOSERVER_BASE_URL=/geoserver
        - VITE_GEOSERVER_REST_URL=/geoserver
        - VITE_GEOSERVER_WORKSPACE=trikaalx
        - VITE_GEOSERVER_USER=admin
        - VITE_GEOSERVER_PASS=geoserver
    container_name: trikaal-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
      tileserver:
        condition: service_healthy
    networks:
      - monolith-net
      - rag-net
      - geoserver-net
    restart: unless-stopped

  tileserver:
    image: asia-south1-docker.pkg.dev/pivotal-sonar-462710-d2/trikaal-monolith/trikaal-tileserver:latest
    build:
      context: ./tileserver
      dockerfile: Dockerfile
    container_name: trikaal-tileserver
    ports:
      - "8001:8001"
    networks:
      - monolith-net
      - geoserver-net
      - rag-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ──────────────────────────────────────────────────────────────────────────────
  # GeoServer Stack (PostGIS + GeoServer + pgAdmin)
  # ──────────────────────────────────────────────────────────────────────────────

  postgis:
    image: postgis/postgis:15-3.3
    container_name: geoserver-postgis
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vessel_tracking
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./geoserver/config/postgis/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - geoserver-net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: geoserver-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped
    depends_on:
      postgis:
        condition: service_healthy
    networks:
      - geoserver-net

  geoserver:
    image: kartoza/geoserver:2.23.0
    container_name: geoserver
    environment:
      - GEOSERVER_ADMIN_USER=admin
      - GEOSERVER_ADMIN_PASSWORD=geoserver
      - GEOWEBCACHE_CACHE_DIR=/opt/geoserver/data_dir/gwc
      - ENABLE_JSONP=true
      - ENABLE_CORS=true
      - CORS_ALLOWED_ORIGINS=*
      - CORS_ALLOWED_METHODS=GET,POST,PUT,DELETE,HEAD,OPTIONS
      - CORS_ALLOWED_HEADERS=*
      - MAX_FILTER_RULES=20
      - OPTIMIZE_LINE_WIDTH=false
      - FOOTPRINTS_DATA_DIR=/opt/footprints_dir
      - GEOSERVER_DATA_DIR=/opt/geoserver/data_dir
      - GEOSERVER_FILEBROWSER_HIDEFS=false
      - NETWORK_BACKEND=2
      - GEOSERVER_LOG_LEVEL=DEFAULT:INFO
      - GEOSERVER_LOG_LOCATION=/opt/geoserver/data_dir/logs/geoserver.log
      - GEOSERVER_OPTS=-Djava.awt.headless=true -Dorg.geotools.referencing.forceXY=true -Djava.library.path=/usr/lib/jni -XX:+UseParallelGC -XX:ParallelGCThreads=4 -XX:SoftRefLRUPolicyMSPerMB=36000 -Xmx2g -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:ParallelGCThreads=4 -XX:ConcGCThreads=2
    volumes:
      - geoserver_data:/opt/geoserver/data_dir
      - ./geoserver/logs:/opt/geoserver/data_dir/logs
      - ./geoserver/config/geoserver/global.xml:/opt/geoserver/data_dir/global.xml:ro
      - ./geoserver/config/geoserver/logging.xml:/opt/geoserver/data_dir/logging.xml:ro
      - ./geoserver/config/geoserver/gwc-gs.xml:/opt/geoserver/data_dir/gwc-gs.xml:ro
    ports:
      - "8080:8080"
    restart: always
    networks:
      - geoserver-net
    depends_on:
      postgis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8080/geoserver"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  geoserver-init:
    image: curlimages/curl:latest
    container_name: geoserver-init
    depends_on:
      geoserver:
        condition: service_healthy
    volumes:
      - ./geoserver/scripts/init-geoserver.sh:/init-geoserver.sh:ro
    entrypoint: ["/bin/sh", "/init-geoserver.sh", "8080"]
    environment:
      - GEOSERVER_HOST=geoserver
      - GEOSERVER_ADMIN_USER=admin
      - GEOSERVER_ADMIN_PASSWORD=geoserver
      - POSTGRES_DB=vessel_tracking
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    networks:
      - geoserver-net
    restart: "no"

  # ──────────────────────────────────────────────────────────────────────────────
  # RAG Base Services
  # ──────────────────────────────────────────────────────────────────────────────

  ollama:
    image: ollama/ollama
    container_name: rag-ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "cat < /dev/null > /dev/tcp/localhost/11434"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s
    networks:
      - rag-net
    restart: unless-stopped

  rag-chroma:
    image: asia-south1-docker.pkg.dev/pivotal-sonar-462710-d2/trikaal-monolith/rag-chroma:latest
    build:
      context: ./rag-base
      dockerfile: dockerfiles/Dockerfile.chroma
    container_name: rag-chroma
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - rag-net
    restart: unless-stopped

  rag-tool-server:
    image: asia-south1-docker.pkg.dev/pivotal-sonar-462710-d2/trikaal-monolith/rag-tool-server:latest
    build:
      context: ./rag-base
      dockerfile: dockerfiles/Dockerfile.tool-server
    container_name: rag-tool-server
    ports:
      - "5001:5000"
    environment:
      MCP_SERVER_PORT: 5000
      CONFIG_YAML_PATH: ./rag_configs/new_compose_config.yaml
      MONGO_HOST: 34.14.212.228
      MONGO_PORT: 27017
      MONGO_USERNAME: admin
      MONGO_PASSWORD: StrongPassword123
      MONGO_AUTH_SOURCE: admin
      MONGO_DB_NAME: dev
      MONGO_URI: mongodb://admin:StrongPassword123@34.14.212.228:27017
      CHROMA_HOST: rag-chroma
      CHROMA_PORT: 8000
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL_NAME: qwen3-vl:2b
      OLLAMA_EMBED_MODEL: qwen3-embedding:0.6b
    volumes:
      - ./rag-base/rag_configs:/app/rag_configs
      - rag_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - rag-net
    depends_on:
      ollama:
        condition: service_healthy
      rag-chroma:
        condition: service_healthy
    restart: unless-stopped

  rag-api:
    image: asia-south1-docker.pkg.dev/pivotal-sonar-462710-d2/trikaal-monolith/rag-api:latest
    build:
      context: ./rag-base
      dockerfile: dockerfiles/Dockerfile.api
    container_name: rag-api
    ports:
      - "8002:8000"
    environment:
      MCP_SERVER_URL: http://rag-tool-server:5000/mcp
      SERVICE_API_URL: http://rag-api:8000
      MONGO_HOST: 34.14.212.228
      MONGO_PORT: 27017
      MONGO_USERNAME: admin
      MONGO_PASSWORD: StrongPassword123
      MONGO_AUTH_SOURCE: admin
      MONGO_DB_NAME: dev
      MONGO_URI: mongodb://admin:StrongPassword123@34.14.212.228:27017
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_MODEL_NAME: gemini-3.1-flash-lite
      OLLAMA_MODEL_NAME: qwen3-vl:2b
      OLLAMA_BASE_URL: http://ollama:11434
      MEMORY_WINDOW_SIZE: 8
      MEMORY_SUMMARY_MODEL: gemini-3.1-flash-lite
      JWT_SECRET: jwt-secret-key
      JWT_ALGORITHM: HS256
    depends_on:
      rag-tool-server:
        condition: service_healthy
    volumes:
      - rag_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - rag-net
    restart: unless-stopped

  rag-chat-app:
    image: asia-south1-docker.pkg.dev/pivotal-sonar-462710-d2/trikaal-monolith/rag-chat-app:latest
    build:
      context: ./rag-base
      dockerfile: dockerfiles/Dockerfile.chat-app
    container_name: rag-chat-app
    ports:
      - "8501:8501"
    environment:
      SERVICE_API_URL: http://rag-api:8000
      MONGO_HOST: 34.14.212.228
      MONGO_PORT: 27017
      MONGO_USERNAME: admin
      MONGO_PASSWORD: StrongPassword123
      MONGO_AUTH_SOURCE: admin
      MONGO_DB_NAME: dev
      MONGO_URI: mongodb://admin:StrongPassword123@34.14.212.228:27017
    depends_on:
      rag-api:
        condition: service_healthy
    volumes:
      - rag_logs:/app/logs
    networks:
      - rag-net
    restart: unless-stopped

  rag-config-app:
    image: asia-south1-docker.pkg.dev/pivotal-sonar-462710-d2/trikaal-monolith/rag-config-app:latest
    build:
      context: ./rag-base
      dockerfile: dockerfiles/Dockerfile.config-generation
    container_name: rag-config-app
    ports:
      - "8502:8502"
    environment:
      CHROMA_HOST: rag-chroma
      CHROMA_PORT: 8000
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_EMBED_MODEL: qwen3-embedding:0.6b
      MONGO_HOST: 34.14.212.228
      MONGO_PORT: 27017
      MONGO_USERNAME: admin
      MONGO_PASSWORD: StrongPassword123
      MONGO_AUTH_SOURCE: admin
      MONGO_DB_NAME: dev
      MONGO_URI: mongodb://admin:StrongPassword123@34.14.212.228:27017
    depends_on:
      ollama:
        condition: service_healthy
      rag-chroma:
        condition: service_healthy
    volumes:
      - rag_logs:/app/logs
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "cat < /dev/null > /dev/tcp/localhost:8502"]
      interval: 45s
      timeout: 30s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  rag-minio:
    image: minio/minio:latest
    container_name: rag-minio
    ports:
      - "9001:9000"
      - "9090:9090"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9090"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rag-net
    restart: unless-stopped

  rag-minio-init:
    image: minio/mc:latest
    container_name: rag-minio-init
    depends_on:
      rag-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://rag-minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/omnisense-docs &&
      exit 0;
      "
    restart: "no"
    networks:
      - rag-net

  # ──────────────────────────────────────────────────────────────────────────────
  # Notification Server v3 (MongoDB + Redis + App + Nginx)
  # ──────────────────────────────────────────────────────────────────────────────

  notification-mongo:
    image: mongo:7
    container_name: notification-mongo
    restart: unless-stopped
    volumes:
      - notification_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - notification-net

  notification-redis:
    image: redis:7-alpine
    container_name: notification-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - notification-net

  notification-app:
    image: asia-south1-docker.pkg.dev/pivotal-sonar-462710-d2/trikaal-monolith/notification-app:latest
    build:
      context: ./notification-server-v3
      dockerfile: Dockerfile
    container_name: notification-app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      # MongoDB configuration
      - mongodb_uri=mongodb://notification-mongo:27017
      - mongodb_db=notification_server
      # SMTP configuration (for email delivery)
      - smtp_host=smtp.gmail.com
      - smtp_port=587
      - smtp_user=
      - smtp_password=
      - smtp_from=
      - smtp_tls=true
      # API authentication
      - api_key_header=X-API-Key
      - api_keys=[]
      # WebSocket configuration
      - ws_heartbeat_interval=30
      # Redis (for WebSocket pub/sub)
      - redis_url=redis://notification-redis:6379
      # Security
      - secret_key=change-me-in-production-use-a-long-random-string
      - sqlite_path=/data/admin.db
      - session_max_age=86400
    volumes:
      - notification_sqlite_data:/data
    depends_on:
      notification-mongo:
        condition: service_healthy
      notification-redis:
        condition: service_healthy
    networks:
      - notification-net

  notification-nginx:
    image: nginx:alpine
    container_name: notification-nginx
    restart: unless-stopped
    ports:
      - "8003:80"
    volumes:
      - ./notification-server-v3/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - notification-app
    networks:
      - notification-net

# ──────────────────────────────────────────────────────────────────────────────
# Networks
# ──────────────────────────────────────────────────────────────────────────────

networks:
  monolith-net:
    driver: bridge
  geoserver-net:
    driver: bridge
  rag-net:
    driver: bridge
  notification-net:
    driver: bridge

# ──────────────────────────────────────────────────────────────────────────────
# Volumes
# ──────────────────────────────────────────────────────────────────────────────

volumes:
  # GeoServer volumes
  postgis_data:
  pgadmin_data:
  geoserver_data:
  
  # RAG Base volumes
  ollama_data:
  rag_logs:
  minio_data:
  chroma_data:
  
  # Notification Server volumes
  notification_mongo_data:
  notification_sqlite_data:
