name: Frontend Mock JSON Check

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-mock-json-check.yml'
      - '.github/scripts/check-frontend-mock-json-usage.sh'
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-mock-json-check.yml'
      - '.github/scripts/check-frontend-mock-json-usage.sh'

jobs:
  frontend-mock-json:
    name: Frontend Mock vs Real API Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for static public JSON fetches (warning only)
        run: |
          chmod +x ../.github/scripts/check-frontend-mock-json-usage.sh
          ../.github/scripts/check-frontend-mock-json-usage.sh src
