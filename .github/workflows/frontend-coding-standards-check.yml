name: Frontend Coding Standards Check

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-coding-standards-check.yml'
      - '.github/scripts/check-frontend-naming-conventions.sh'
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-coding-standards-check.yml'
      - '.github/scripts/check-frontend-naming-conventions.sh'

jobs:
  frontend-coding-standards:
    name: Frontend Naming & Coding Standards Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # ─── Check 1: Naming Conventions ───
      - name: Check naming conventions (files, functions, classes, types)
        run: |
          chmod +x ../.github/scripts/check-frontend-naming-conventions.sh
          ../.github/scripts/check-frontend-naming-conventions.sh src

      # ─── Check 2: ESLint ───
      - name: Run ESLint
        run: npx eslint src/ --max-warnings=0

      # ─── Check 3: TypeScript Type Check ───
      - name: TypeScript type check
        run: npx tsc -b --noEmit
