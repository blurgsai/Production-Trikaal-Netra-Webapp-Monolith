name: Backend Test Check

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-test-check.yml'
      - '.github/scripts/check-backend-integration-test-coverage.sh'
      - '.github/scripts/check-backend-integration-test-minimum.sh'
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-test-check.yml'
      - '.github/scripts/check-backend-integration-test-coverage.sh'
      - '.github/scripts/check-backend-integration-test-minimum.sh'

jobs:
  backend-tests:
    name: Backend Unit & Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ─── Check 1: Integration Test Coverage ───
      - name: Check integration test coverage (every router feature has integration tests)
        run: |
          chmod +x ../.github/scripts/check-backend-integration-test-coverage.sh
          ../.github/scripts/check-backend-integration-test-coverage.sh .

      # ─── Check 2: Integration Test Minimum ───
      - name: Check integration test minimum (each integration file has >= 5 test functions)
        run: |
          chmod +x ../.github/scripts/check-backend-integration-test-minimum.sh
          ../.github/scripts/check-backend-integration-test-minimum.sh . 5

      # ─── Check 3: Run All Tests (unit + integration) ───
      - name: Run all backend tests
        run: |
          if [ -d tests/ ] && [ -n "$(find tests/ -name 'test_*.py' 2>/dev/null)" ]; then
            python -m pytest tests/ -v --tb=short
          else
            echo "SKIP: No test files found in tests/"
          fi

      # ─── Check 4: Run Only Integration Tests (separate report) ───
      - name: Run integration tests only
        run: |
          if [ -d tests/ ] && [ -n "$(find tests/ -name 'test_*.py' 2>/dev/null)" ]; then
            python -m pytest tests/ -v --tb=short -m integration
          else
            echo "SKIP: No test files found in tests/"
          fi
