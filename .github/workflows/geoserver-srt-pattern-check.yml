name: GeoServer SRT Pattern Check

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'geoserver/**'
      - '.github/workflows/geoserver-srt-pattern-check.yml'
      - '.github/scripts/check-geoserver-srt-pattern.sh'
  push:
    branches: [main, develop]
    paths:
      - 'geoserver/**'
      - '.github/workflows/geoserver-srt-pattern-check.yml'
      - '.github/scripts/check-geoserver-srt-pattern.sh'

jobs:
  geoserver-srt-pattern:
    name: GeoServer Service Replication Template Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ─── Check 0: SRT Structure Validation ───
      - name: Validate SRT pattern (required files, dirs, scripts, gitignore)
        run: |
          chmod +x .github/scripts/check-geoserver-srt-pattern.sh
          .github/scripts/check-geoserver-srt-pattern.sh geoserver

      # ─── Check 1: Docker Compose Syntax ───
      - name: Validate docker-compose.yml syntax
        run: |
          if [ -f geoserver/docker-compose.yml ]; then
            docker compose -f geoserver/docker-compose.yml config --quiet
          else
            echo "SKIP: docker-compose.yml not found"
            exit 1
          fi

      # ─── Check 2: Shell Script Syntax ───
      - name: Validate shell script syntax
        run: |
          find geoserver/ -name '*.sh' -type f -exec bash -n {} \;

      # ─── Check 3: No hardcoded secrets in tracked files ───
      - name: Check no hardcoded secrets in config files
        run: |
          SECRET_PATTERNS="SecurePassword|password123|secret_key_here|BEGIN.*PRIVATE KEY"
          MATCHES=$(grep -rnE "$SECRET_PATTERNS" geoserver/config/ geoserver/scripts/ geoserver/docker-compose.yml 2>/dev/null || true)
          if [ -n "$MATCHES" ]; then
            echo "FAIL: Potential hardcoded secrets found:"
            echo "$MATCHES"
            exit 1
          fi
          echo "PASS: No hardcoded secrets detected"
