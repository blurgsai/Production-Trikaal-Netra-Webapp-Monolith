name: Tileserver Coding Standards Check

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'tileserver/**'
      - '.github/workflows/tileserver-coding-standards-check.yml'
      - '.github/scripts/check-tileserver-naming-conventions.sh'
  push:
    branches: [main, develop]
    paths:
      - 'tileserver/**'
      - '.github/workflows/tileserver-coding-standards-check.yml'
      - '.github/scripts/check-tileserver-naming-conventions.sh'

jobs:
  tileserver-coding-standards:
    name: Tileserver Naming & Coding Standards Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tileserver

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: tileserver/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ─── Check 1: Naming Conventions ───
      - name: Check naming conventions (files, functions, classes, variables)
        run: |
          chmod +x ../.github/scripts/check-tileserver-naming-conventions.sh
          ../.github/scripts/check-tileserver-naming-conventions.sh src

      # ─── Check 2: Ruff Linter ───
      - name: Run ruff linter
        run: |
          if [ -d src/ ] && [ -n "$(find src/ -name '*.py' -not -name '__pycache__' 2>/dev/null)" ]; then
            pip install ruff
            ruff check src/
          else
            echo "SKIP: No Python source files in src/ -- skipping ruff"
          fi
