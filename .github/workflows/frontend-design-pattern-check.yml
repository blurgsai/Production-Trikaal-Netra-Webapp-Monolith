name: Frontend Design Pattern Check

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-design-pattern-check.yml'
      - '.github/scripts/check-no-nested-features.sh'
      - '.github/scripts/check-no-top-level-tech-folders.sh'
      - '.github/scripts/check-layer-imports.sh'
      - '.github/scripts/check-barrel-exports.sh'
      - '.github/scripts/validate-feature-structure.sh'
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-design-pattern-check.yml'
      - '.github/scripts/check-no-nested-features.sh'
      - '.github/scripts/check-no-top-level-tech-folders.sh'
      - '.github/scripts/check-layer-imports.sh'
      - '.github/scripts/check-barrel-exports.sh'
      - '.github/scripts/validate-feature-structure.sh'

jobs:
  frontend-design-pattern:
    name: React Architecture & Design Pattern Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # ─── Check 1: Feature Folder Structure ───
      - name: Validate feature folder structure
        run: |
          chmod +x ../.github/scripts/validate-feature-structure.sh
          ../.github/scripts/validate-feature-structure.sh src/features

      # ─── Check 2: No Nested Feature Folders ───
      - name: Check for nested feature folders
        run: |
          chmod +x ../.github/scripts/check-no-nested-features.sh
          ../.github/scripts/check-no-nested-features.sh src/features

      # ─── Check 3: No Top-Level Technical Role Folders ───
      - name: Check no top-level /components, /hooks, /utils folders
        run: |
          chmod +x ../.github/scripts/check-no-top-level-tech-folders.sh
          ../.github/scripts/check-no-top-level-tech-folders.sh src

      # ─── Check 4: Layer Import Rules ───
      - name: Check layer import rules (UI no api/, hooks through mapper, etc.)
        run: |
          chmod +x ../.github/scripts/check-layer-imports.sh
          ../.github/scripts/check-layer-imports.sh src/features

      # ─── Check 5: Barrel Export Rules ───
      - name: Check barrel exports (no api/types or mappers exported)
        run: |
          chmod +x ../.github/scripts/check-barrel-exports.sh
          ../.github/scripts/check-barrel-exports.sh src/features

      # ─── Check 6: ESLint Boundary Rules ───
      - name: Run ESLint boundary checks
        run: npx eslint src/ --max-warnings=0

      # ─── Check 7: TypeScript Type Check ───
      - name: TypeScript type check
        run: npx tsc -b --noEmit
