name: Frontend Test Check

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-test-check.yml'
      - '.github/scripts/check-frontend-integration-test-coverage.sh'
      - '.github/scripts/check-frontend-integration-test-minimum.sh'
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-test-check.yml'
      - '.github/scripts/check-frontend-integration-test-coverage.sh'
      - '.github/scripts/check-frontend-integration-test-minimum.sh'

jobs:
  frontend-tests:
    name: Frontend Unit & Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # ─── Check 1: Integration Test Coverage ───
      - name: Check integration test coverage (every UI feature has integration tests)
        run: |
          chmod +x ../.github/scripts/check-frontend-integration-test-coverage.sh
          ../.github/scripts/check-frontend-integration-test-coverage.sh src/features

      # ─── Check 2: Integration Test Minimum ───
      - name: Check integration test minimum (each integration file has >= 10 tests)
        run: |
          chmod +x ../.github/scripts/check-frontend-integration-test-minimum.sh
          ../.github/scripts/check-frontend-integration-test-minimum.sh src/features 10

      # ─── Check 3: Run All Tests (unit + integration) ───
      - name: Run all tests
        run: npx vitest run --reporter=verbose
