name: Tileserver Design Pattern Check

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'tileserver/**'
      - '.github/workflows/tileserver-design-pattern-check.yml'
      - '.github/scripts/check-tileserver-*'
      - '.github/scripts/validate-tileserver-*'
  push:
    branches: [main, develop]
    paths:
      - 'tileserver/**'
      - '.github/workflows/tileserver-design-pattern-check.yml'
      - '.github/scripts/check-tileserver-*'
      - '.github/scripts/validate-tileserver-*'

jobs:
  tileserver-design-pattern:
    name: Tileserver Architecture & Design Pattern Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tileserver

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: tileserver/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install import-linter

      # ─── Check 0: All code must be under src/ ───
      - name: Enforce src/ structure
        run: |
          chmod +x ../.github/scripts/check-tileserver-src-enforcement.sh
          ../.github/scripts/check-tileserver-src-enforcement.sh .

      # ─── Check 1: Feature Folder Structure ───
      - name: Validate tileserver feature folder structure
        run: |
          chmod +x ../.github/scripts/validate-tileserver-feature-structure.sh
          ../.github/scripts/validate-tileserver-feature-structure.sh src/features

      # ─── Check 2: No Nested Feature Folders ───
      - name: Check for nested feature folders
        run: |
          chmod +x ../.github/scripts/check-tileserver-no-nested-features.sh
          ../.github/scripts/check-tileserver-no-nested-features.sh src/features

      # ─── Check 3: No Top-Level Technical Role Folders ───
      - name: Check no top-level /models, /routes, /schemas folders
        run: |
          chmod +x ../.github/scripts/check-tileserver-no-top-level-tech-folders.sh
          ../.github/scripts/check-tileserver-no-top-level-tech-folders.sh src

      # ─── Check 4: Layer Import Rules ───
      - name: Check layer import rules (router no repository, one-directional flow)
        run: |
          chmod +x ../.github/scripts/check-tileserver-layer-imports.sh
          ../.github/scripts/check-tileserver-layer-imports.sh src/features

      # ─── Check 5: Barrel Export Rules ───
      - name: Check barrel exports (no repository functions exported)
        run: |
          chmod +x ../.github/scripts/check-tileserver-barrel-exports.sh
          ../.github/scripts/check-tileserver-barrel-exports.sh src/features

      # ─── Check 6: Services Must Not Import FastAPI ───
      - name: Check services are independent of FastAPI
        run: |
          chmod +x ../.github/scripts/check-tileserver-services-no-fastapi.sh
          ../.github/scripts/check-tileserver-services-no-fastapi.sh src/features

      # ─── Check 7: Router Rules ───
      - name: Check router rules (delegates to services, no repository imports)
        run: |
          chmod +x ../.github/scripts/check-tileserver-router-rules.sh
          ../.github/scripts/check-tileserver-router-rules.sh src/features

      # ─── Check 8: Import Linter ───
      - name: Run import-linter boundary checks
        run: |
          if [ -d src/ ] && [ -n "$(find src/ -name '*.py' -not -name '__pycache__' 2>/dev/null)" ]; then
            lint-imports
          else
            echo "SKIP: No Python source files in src/ — skipping import-linter"
          fi

      # ─── Check 9: Ruff Linter ───
      - name: Run ruff linter
        run: |
          if [ -d src/ ] && [ -n "$(find src/ -name '*.py' -not -name '__pycache__' 2>/dev/null)" ]; then
            pip install ruff
            ruff check src/
          else
            echo "SKIP: No Python source files in src/ — skipping ruff"
          fi
