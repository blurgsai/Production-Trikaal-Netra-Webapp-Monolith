name: Backend Design Pattern Check

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-design-pattern-check.yml'
      - '.github/scripts/check-backend-*'
      - '.github/scripts/validate-backend-*'
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-design-pattern-check.yml'
      - '.github/scripts/check-backend-*'
      - '.github/scripts/validate-backend-*'

jobs:
  backend-design-pattern:
    name: FastAPI Architecture & Design Pattern Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ─── Check 1: Feature Folder Structure ───
      - name: Validate backend feature folder structure
        run: |
          chmod +x ../.github/scripts/validate-backend-feature-structure.sh
          ../.github/scripts/validate-backend-feature-structure.sh src/features

      # ─── Check 2: No Nested Feature Folders ───
      - name: Check for nested feature folders
        run: |
          chmod +x ../.github/scripts/check-backend-no-nested-features.sh
          ../.github/scripts/check-backend-no-nested-features.sh src/features

      # ─── Check 3: No Top-Level Technical Role Folders ───
      - name: Check no top-level /models, /routes, /schemas folders
        run: |
          chmod +x ../.github/scripts/check-backend-no-top-level-tech-folders.sh
          ../.github/scripts/check-backend-no-top-level-tech-folders.sh src

      # ─── Check 4: Layer Import Rules ───
      - name: Check layer import rules (router no raw schemas, one-directional flow)
        run: |
          chmod +x ../.github/scripts/check-backend-layer-imports.sh
          ../.github/scripts/check-backend-layer-imports.sh src/features

      # ─── Check 5: Barrel Export Rules (__init__.py) ───
      - name: Check barrel exports (no raw schemas or mappers exported)
        run: |
          chmod +x ../.github/scripts/check-backend-barrel-exports.sh
          ../.github/scripts/check-backend-barrel-exports.sh src/features

      # ─── Check 6: Services Must Not Import FastAPI ───
      - name: Check services are independent of FastAPI
        run: |
          chmod +x ../.github/scripts/check-backend-services-no-fastapi.sh
          ../.github/scripts/check-backend-services-no-fastapi.sh src/features

      # ─── Check 7: Router Rules (domain models only, delegates to services) ───
      - name: Check router rules (response_model=DomainModel, delegates to services)
        run: |
          chmod +x ../.github/scripts/check-backend-router-rules.sh
          ../.github/scripts/check-backend-router-rules.sh src/features

      # ─── Check 8: Import Linter (Python dependency boundaries) ───
      - name: Run import-linter boundary checks
        run: |
          if [ -d src/ ] && [ -n "$(find src/ -name '*.py' -not -name '__pycache__' 2>/dev/null)" ]; then
            lint-imports
          else
            echo "SKIP: No Python source files in src/ — skipping import-linter"
          fi

      # ─── Check 9: Ruff Linter ───
      - name: Run ruff linter
        run: |
          if [ -d src/ ] && [ -n "$(find src/ -name '*.py' -not -name '__pycache__' 2>/dev/null)" ]; then
            ruff check src/
          else
            echo "SKIP: No Python source files in src/ — skipping ruff"
          fi
