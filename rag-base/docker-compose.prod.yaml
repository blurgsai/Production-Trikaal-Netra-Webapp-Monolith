services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse-csv-ingest
    network_mode: host
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: naji123
    volumes:
      - ./docker_volumes/clickhouse/init_db:/docker-entrypoint-initdb.d
      - ./docker_volumes/clickhouse/sensor_data.csv:/var/lib/clickhouse/user_files/sensor_data.csv
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    container_name: rag_ollama_service
    network_mode: host
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ./docker_volumes/ollama:/root/.ollama
    restart: unless-stopped
  
  tool-server:
    image: asia-south1-docker.pkg.dev/pivotal-sonar-462710-d2/trident-chatbot-api/tool-server:latest
    container_name: mcp-tool-server
    network_mode: host
    environment:
      MCP_SERVER_PORT: 5000
      CONFIG_YAML_PATH: /app/proper_config.yaml
      
      MONGO_HOST: ${MONGO_HOST}
      MONGO_PORT: ${MONGO_PORT:-27017}
      MONGO_USERNAME: ${MONGO_USERNAME}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_AUTH_SOURCE: ${MONGO_AUTH_SOURCE:-admin}
      MONGO_DB_NAME: ${MONGO_DB_NAME:-dev}
      MONGO_URI: ${MONGO_URI}
      
      CLICKHOUSE_HOST: http://localhost:8123
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: naji123
      
      CHROMA_HOST: localhost
      CHROMA_PORT: 8080
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
      OLLAMA_MODEL_NAME: ${OLLAMA_MODEL_NAME:-qwen3-vl:2b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-qwen3-embedding:0.6b}
      
    volumes:
      - ./docker_volumes/logs:/app/logs
      - ./rag_configs/page_nav.yaml:/app/proper_config.yaml
      - ./docker_volumes/clickhouse:/app/clickhouse_data
    restart: unless-stopped

  api:
    image: asia-south1-docker.pkg.dev/pivotal-sonar-462710-d2/trident-chatbot-api/api:latest
    container_name: chat-api
    network_mode: host
    environment:
      MCP_SERVER_URL: http://localhost:5000/mcp
      SERVICE_API_URL: http://localhost:8000
      MONGO_HOST: ${MONGO_HOST}
      MONGO_PORT: ${MONGO_PORT:-27017}
      MONGO_USERNAME: ${MONGO_USERNAME}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_AUTH_SOURCE: ${MONGO_AUTH_SOURCE:-admin}
      MONGO_DB_NAME: ${MONGO_DB_NAME:-dev}
      MONGO_URI: ${MONGO_URI}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_MODEL_NAME: ${GEMINI_MODEL_NAME:-gemini-2.5-flash-lite}
      OLLAMA_MODEL_NAME: ${OLLAMA_MODEL_NAME:-qwen3-vl:2b}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
      MEMORY_WINDOW_SIZE: 8
      MEMORY_SUMMARY_MODEL: gemini-2.5-flash-lite
      JWT_SECRET: jwt-secret-key
      JWT_ALGORITHM: HS256
      
    volumes:
      - ./docker_volumes/logs:/app/logs
    restart: unless-stopped

  chat-app:
    image: asia-south1-docker.pkg.dev/pivotal-sonar-462710-d2/trident-chatbot-api/chat-app:latest
    container_name: chat-ui
    network_mode: host
    environment:
      SERVICE_API_URL: http://localhost:8000
      MONGO_HOST: ${MONGO_HOST}
      MONGO_PORT: ${MONGO_PORT:-27017}
      MONGO_USERNAME: ${MONGO_USERNAME}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_AUTH_SOURCE: ${MONGO_AUTH_SOURCE:-admin}
      MONGO_DB_NAME: ${MONGO_DB_NAME:-dev}
      MONGO_URI: ${MONGO_URI}
    volumes:
      - ./docker_volumes/logs:/app/logs
    restart: unless-stopped

  config-app:
    image: asia-south1-docker.pkg.dev/pivotal-sonar-462710-d2/trident-chatbot-api/config-app:latest
    container_name: config-generator
    network_mode: host
    environment:
      CHROMA_HOST: localhost
      CHROMA_PORT: 8080
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-qwen3-embedding:0.6b}
      MONGO_HOST: ${MONGO_HOST}
      MONGO_PORT: ${MONGO_PORT:-27017}
      MONGO_USERNAME: ${MONGO_USERNAME}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_AUTH_SOURCE: ${MONGO_AUTH_SOURCE:-admin}
      MONGO_DB_NAME: ${MONGO_DB_NAME:-dev}
      MONGO_URI: ${MONGO_URI}
    volumes:
      - ./docker_volumes/logs:/app/logs
    restart: unless-stopped
