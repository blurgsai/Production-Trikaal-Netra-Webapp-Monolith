services:
  ollama:
    image: ollama/ollama
    container_name: rag_ollama_service
    ports:
      - "11434:11434"
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ./docker_volumes/ollama:/root/.ollama
      - ~/.ollama:/root/.ollama
    healthcheck:
      test: [ "CMD", "/bin/bash", "-c", "cat < /dev/null > /dev/tcp/localhost/11434" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s
    profiles: [infra, tool-server, api, test-ui, config, all]

  tool-server:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.tool-server
    container_name: mcp-tool-server
    ports:
      - "5000:5000"
    environment:
      MCP_SERVER_PORT: 5000
      CONFIG_YAML_PATH: ${CONFIG_YAML_PATH}
      
      MONGO_HOST: ${DOCKER_MONGO_HOST:-mongo}
      MONGO_PORT: ${DOCKER_MONGO_PORT:-27017}
      MONGO_USERNAME: ${DOCKER_MONGO_USERNAME:-chat-admin}
      MONGO_PASSWORD: ${DOCKER_MONGO_PASSWORD:-chat-pwd-123}
      MONGO_AUTH_SOURCE: ${DOCKER_MONGO_AUTH_SOURCE:-admin}
      MONGO_DB_NAME: ${MONGO_DB_NAME:-dev}
      MONGO_URI: ${DOCKER_MONGO_URI:-mongodb://chat-admin:chat-pwd-123@mongo:27017/?authSource=admin}
      
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST:-http://localhost:8123}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-naji123}
      
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL_NAME: ${OLLAMA_MODEL_NAME:-qwen3-vl:2b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-qwen3-embedding:0.6b}
    
    volumes:
      - type: bind
        source: ${CONFIG_YAML_PATH}
        target: /app/${CONFIG_YAML_PATH}
      - ./docker_volumes/logs:/app/logs
      - ./docker_volumes/clickhouse:/app/clickhouse_data
    healthcheck:
      test: ["CMD", "curl", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    profiles: [tool-server, api, test-ui, all]

  api:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.api
    container_name: chat-api
    ports:
      - "8000:8000"
    environment:
      MCP_SERVER_URL: http://tool-server:5000/mcp
      SERVICE_API_URL: http://api:8000
      MONGO_HOST: ${DOCKER_MONGO_HOST:-mongo}
      MONGO_PORT: ${DOCKER_MONGO_PORT:-27017}
      MONGO_USERNAME: ${DOCKER_MONGO_USERNAME:-chat-admin}
      MONGO_PASSWORD: ${DOCKER_MONGO_PASSWORD:-chat-pwd-123}
      MONGO_AUTH_SOURCE: ${DOCKER_MONGO_AUTH_SOURCE:-admin}
      MONGO_DB_NAME: ${MONGO_DB_NAME:-dev}
      MONGO_URI: ${DOCKER_MONGO_URI:-mongodb://chat-admin:chat-pwd-123@mongo:27017/?authSource=admin}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_MODEL_NAME: ${GEMINI_MODEL_NAME:-gemini-2.5-flash-lite}
      OLLAMA_MODEL_NAME: ${OLLAMA_MODEL_NAME:-qwen3-vl:2b}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      MEMORY_WINDOW_SIZE: 8
      MEMORY_SUMMARY_MODEL: gemini-2.5-flash-lite
      JWT_SECRET: jwt-secret-key
      JWT_ALGORITHM: HS256

    depends_on:
      tool-server:
        condition: service_healthy
    volumes:
      - ./docker_volumes/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    profiles: [api, test-ui, all]

  chat-app:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.chat-app
    container_name: chat-ui
    ports:
      - "8501:8501"
    environment:
      SERVICE_API_URL: http://api:8000
      MONGO_HOST: ${DOCKER_MONGO_HOST:-mongo}
      MONGO_PORT: ${DOCKER_MONGO_PORT:-27017}
      MONGO_USERNAME: ${DOCKER_MONGO_USERNAME:-chat-admin}
      MONGO_PASSWORD: ${DOCKER_MONGO_PASSWORD:-chat-pwd-123}
      MONGO_AUTH_SOURCE: ${DOCKER_MONGO_AUTH_SOURCE:-admin}
      MONGO_DB_NAME: ${MONGO_DB_NAME:-dev}
      MONGO_URI: ${DOCKER_MONGO_URI:-mongodb://chat-admin:chat-pwd-123@mongo:27017/?authSource=admin}
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./docker_volumes/logs:/app/logs
    profiles: [test-ui, all]

  config-app:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.config-generation
    container_name: config-generator
    ports:
      - "8502:8502"
    environment:
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-qwen3-embedding:0.6b}
      MONGO_HOST: ${DOCKER_MONGO_HOST:-mongo}
      MONGO_PORT: ${DOCKER_MONGO_PORT:-27017}
      MONGO_USERNAME: ${DOCKER_MONGO_USERNAME:-chat-admin}
      MONGO_PASSWORD: ${DOCKER_MONGO_PASSWORD:-chat-pwd-123}
      MONGO_AUTH_SOURCE: ${DOCKER_MONGO_AUTH_SOURCE:-admin}
      MONGO_DB_NAME: ${MONGO_DB_NAME:-dev}
      MONGO_URI: ${DOCKER_MONGO_URI:-mongodb://chat-admin:chat-pwd-123@mongo:27017/?authSource=admin}
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./docker_volumes/logs:/app/logs
    profiles: [config, all]
    healthcheck:
      test: [ "CMD", "/bin/bash", "-c", "cat < /dev/null > /dev/tcp/localhost/8502" ]
      interval: 45s
      timeout: 30s
      retries: 5
      start_period: 30s

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9001:9000"
      - "9090:9090"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9090"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/omnisense-docs &&
      exit 0;
      "
    restart: "no"

volumes:
  minio-data: